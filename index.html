<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Le Gourmet</title>
  <script>
    (function() {
      const stored = localStorage.getItem('lang');
      if (stored && ['fr', 'en', 'mg'].includes(stored)) {
        window.location.href = '/' + stored + '/index.html';
      } else {
        const browserLang = navigator.language.slice(0, 2);
        const lang = ['fr', 'en', 'mg'].includes(browserLang) ? browserLang : 'fr';
        window.location.href = '/' + lang + '/index.html';
      }
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
